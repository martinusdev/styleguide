name: Test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  mcp-server:
    name: MCP server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: yarn install
      - run: yarn test
